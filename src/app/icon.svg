<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="chromePipeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="32%" stop-color="#64748b" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="68%" stop-color="#64748b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="keyNeonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>

  <rect width="200" height="200" rx="40" fill="#020617" />

  <!-- Tuyau chrome liquide en arriere-plan -->
  <g>
    <line
      x1="35"
      y1="165"
      x2="165"
      y2="35"
      stroke="url(#chromePipeGrad)"
      stroke-width="22"
      stroke-linecap="round"
    />
    <circle cx="35" cy="165" r="15" fill="#1e293b" stroke="#94a3b8" stroke-width="2" />
    <circle cx="165" cy="35" r="15" fill="#1e293b" stroke="#94a3b8" stroke-width="2" />
    <circle cx="79" cy="121" r="12" fill="none" stroke="#94a3b8" stroke-width="2.5" />
    <circle cx="121" cy="79" r="12" fill="none" stroke="#94a3b8" stroke-width="2.5" />
  </g>

  <!-- Cle de serrurier croisee, neon cyber -->
  <g>
    <line
      x1="52"
      y1="52"
      x2="140"
      y2="140"
      stroke="url(#keyNeonGrad)"
      stroke-width="9"
      stroke-linecap="round"
    />
    <g transform="translate(50,50) rotate(45)">
      <polygon
        points="0,-17 14.7,-8.5 14.7,8.5 0,17 -14.7,8.5 -14.7,-8.5"
        fill="url(#keyNeonGrad)"
        stroke="#083344"
        stroke-width="1.5"
      />
      <circle cx="0" cy="0" r="6" fill="#020617" />
    </g>
    <g transform="translate(142,142) rotate(45)">
      <rect x="-3" y="0" width="16" height="7" fill="url(#keyNeonGrad)" />
      <rect x="-3" y="10" width="10" height="7" fill="url(#keyNeonGrad)" />
    </g>
  </g>
</svg>
